services:
  - type: web
    name: mfl-location-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
